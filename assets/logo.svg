<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">مسجل حضور حلقات العلم Logo</title>
  <desc id="desc">Minimal flat logo combining an open book with attendance check and QR motif.</desc>

  <rect width="1200" height="1200" fill="#FFFFFF" />

  <g transform="translate(600 470)">
    <!-- Open book base -->
    <path d="M-300 140 C-220 70 -120 50 -20 72 L-20 280 C-120 258 -220 278 -300 348 Z"
          fill="none" stroke="#0A192F" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M20 72 C120 50 220 70 300 140 L300 348 C220 278 120 258 20 280 Z"
          fill="none" stroke="#0A192F" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Center fold / spine -->
    <line x1="0" y1="76" x2="0" y2="284" stroke="#D4AF37" stroke-width="16" stroke-linecap="round"/>

    <!-- Subtle page lines -->
    <path d="M-250 180 C-175 130 -95 122 -22 137" fill="none" stroke="#D4AF37" stroke-width="10" stroke-linecap="round"/>
    <path d="M250 180 C175 130 95 122 22 137" fill="none" stroke="#D4AF37" stroke-width="10" stroke-linecap="round"/>

    <!-- QR motif (attendance / digital) -->
    <g transform="translate(165 -65)">
      <rect x="-72" y="-72" width="144" height="144" rx="16" fill="none" stroke="#0A192F" stroke-width="14"/>
      <rect x="-50" y="-50" width="28" height="28" fill="#0A192F"/>
      <rect x="22" y="-50" width="28" height="28" fill="#0A192F"/>
      <rect x="-50" y="22" width="28" height="28" fill="#0A192F"/>
      <rect x="0" y="0" width="16" height="16" fill="#D4AF37"/>
      <rect x="20" y="0" width="16" height="16" fill="#D4AF37"/>
      <rect x="0" y="20" width="16" height="16" fill="#D4AF37"/>
      <rect x="40" y="40" width="10" height="10" fill="#0A192F"/>
    </g>

    <!-- Attendance checkmark -->
    <path d="M80 42 L128 90 L218 0" fill="none" stroke="#D4AF37" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Arabic title -->
  <text x="600" y="930" text-anchor="middle"
        font-size="76" font-weight="700"
        font-family="Amiri, 'Noto Naskh Arabic', 'Scheherazade New', serif"
        fill="#0A192F"
        direction="rtl" unicode-bidi="plaintext">مسجل حضور حلقات العلم</text>
</svg>
