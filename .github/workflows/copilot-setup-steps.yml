name: "Copilot Setup Steps"

# Provisions the Copilot cloud agent's ephemeral environment so it can build,
# lint and test exactly like CI. Runs automatically when this file changes (so
# you can validate it) and can be run manually from the Actions tab.
# NOTE: this only takes effect once merged to the default branch.

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be named `copilot-setup-steps` or the agent will ignore it.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Chrome lets the browser-gated image-render tests run; if it's absent they
      # skip gracefully, so this is best-effort.
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Expose Chrome to the render engine
        run: echo "PUPPETEER_EXECUTABLE_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"
